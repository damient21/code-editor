<style>
    body { text-align: center; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
    #list { flex-grow: 1; overflow-y: auto; border-top: 1px solid #ccc; padding-top: 10px; margin-top: 10px; }
    .save-item { display: flex; justify-content: center; align-items: center; gap: 5px; margin-bottom: 8px; }
    .del-btn { color: white; background: #ff4d4d; border: none; cursor: pointer; border-radius: 3px; padding: 2px 8px; }
    .load-btn { cursor: pointer; flex-shrink: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
</style>
<body>
    <p>When you click on a savestate, all of your current progress will be lost unless you have saved it.</p>
    <div>
        <input id='name' placeholder='Save name...'>
        <button onclick='save()'>Save Current</button>
    </div>
    <div id='list'></div>

    <script>
        const n = document.getElementById('name');
        const l = document.getElementById('list');
        const mainInput = window.parent.document.getElementById('input');

        function save() {
            if(n.value) {
                localStorage.setItem('ss_' + n.value, mainInput.value);
                n.value = '';
                show();
            }
        }

        function removeSave(key) {
            localStorage.removeItem(key);
            show();
        }

        function show() {
            l.innerHTML = '';
            Object.keys(localStorage).filter(k => k.startsWith('ss_')).sort().forEach(k => {
                const div = document.createElement('div');
                div.className = 'save-item';
                
                const loadBtn = document.createElement('button');
                loadBtn.className = 'load-btn';
                loadBtn.innerText = k.replace('ss_', '');
                loadBtn.onclick = () => {
                    mainInput.value = localStorage.getItem(k);
                    window.parent.saveDefault();
                };

                const delBtn = document.createElement('button');
                delBtn.className = 'del-btn';
                delBtn.innerText = 'X';
                delBtn.onclick = (e) => { if (confirm(`Delete ${loadBtn.innerHTML}? 

This cannot be undone.`)) {e.stopPropagation(); removeSave(k);} };

                div.appendChild(loadBtn);
                div.appendChild(delBtn);
                l.appendChild(div);
            });
        }
        show();
    </script>
</body>
